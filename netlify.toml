[build]
  publish = "site"
  command = "echo Static site ready"

[build.environment]
  NODE_ENV = "production"
  NETLIFY_SKIP_DEPENDENCY_INSTALL = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  publish = "site"
  port = 8888